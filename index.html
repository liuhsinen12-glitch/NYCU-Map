            { id: "節點G8", lng: 120.99799, lat: 24.78560, type: "平緩坡道", slope: 6.99, routeId: "G", name: "綠色快捷無障礙線" },
            { id: "節點G9", lng: 120.99794, lat: 24.78462, type: "標準無障礙坡", slope: 8.75, routeId: "G", name: "綠色快捷無障礙線" },
            { id: "節點G11", lng: 120.99711, lat: 24.78413, type: "轉彎平緩坡", slope: 5.24, routeId: "G", name: "綠色快捷無障礙線" },
            { id: "終點(研三舍)", lng: 120.99704, lat: 24.78390, type: "終點/安全抵達", slope: 12.28, routeId: "G", name: "綠色快捷無障礙線" }
        ];

        // 38 個無障礙坡道座標資料
        const rampData = [
            { id: "坡道 1", lat: 24.78662, lng: 120.99619 },
            { id: "坡道 2", lat: 24.78962, lng: 120.99516 },
            { id: "坡道 3", lat: 24.78683, lng: 120.99568 },
            { id: "坡道 4", lat: 24.78616, lng: 120.99978 },
            { id: "坡道 5", lat: 24.78390, lng: 120.99722 },
            { id: "坡道 6", lat: 24.78812, lng: 120.99773 },
            { id: "坡道 7", lat: 24.78744, lng: 121.00060 },
            { id: "坡道 8", lat: 24.78780, lng: 120.99717 },
            { id: "坡道 9", lat: 24.78806, lng: 120.99843 },
            { id: "坡道 10", lat: 24.78843, lng: 120.99836 },
            { id: "坡道 11", lat: 24.78959, lng: 120.99610 },
            { id: "坡道 12", lat: 24.79021, lng: 120.99651 },
            { id: "坡道 13", lat: 24.79025, lng: 120.99594 },
            { id: "坡道 14", lat: 24.78795, lng: 120.99554 },
            { id: "坡道 15", lat: 24.78788, lng: 120.99627 },
            { id: "坡道 16", lat: 24.78723, lng: 120.99599 },
            { id: "坡道 17", lat: 24.78569, lng: 120.99568 },
            { id: "坡道 18", lat: 24.78618, lng: 120.99585 },
            { id: "坡道 19", lat: 24.78652, lng: 120.99864 },
            { id: "坡道 20", lat: 24.78670, lng: 120.99815 },
            { id: "坡道 21", lat: 24.78645, lng: 121.00162 },
            { id: "坡道 22", lat: 24.78431, lng: 120.99740 },
            { id: "坡道 23", lat: 24.78449, lng: 120.99539 },
            { id: "坡道 24", lat: 24.78385, lng: 120.99638 },
            { id: "坡道 25", lat: 24.78571, lng: 120.99753 },
            { id: "坡道 26", lat: 24.78925, lng: 120.99645 },
            { id: "坡道 27", lat: 24.78680, lng: 120.99660 },
            { id: "坡道 28", lat: 24.78706, lng: 120.99652 },
            { id: "坡道 29", lat: 24.78729, lng: 120.99657 },
            { id: "坡道 30", lat: 24.78429, lng: 120.99572 },
            { id: "坡道 31", lat: 24.78968, lng: 120.99746 },
            { id: "坡道 32", lat: 24.78887, lng: 120.99591 },
            { id: "坡道 33", lat: 24.78936, lng: 120.99805 },
            { id: "坡道 34", lat: 24.78523, lng: 120.99850 },
            { id: "坡道 35", lat: 24.79008, lng: 120.99723 },
            { id: "坡道 36", lat: 24.78975, lng: 120.99705 },
            { id: "坡道 37", lat: 24.78674, lng: 120.99709 },
            { id: "坡道 38", lat: 24.78698, lng: 120.99751 }
        ];
        const allRoutes = { 'P': routeP, 'O': routeO, 'B': routeB, 'G': routeG };
        const rawData = [...routeP, ...routeO, ...routeB, ...routeG];

        // ==========================================
        // 3. 舒適度評分演算與動態 UI 渲染
        // ==========================================
        const routeEvaluations = [
            { id: 'G', name: '路線 G (綠色快捷無障礙線)', desc: '最推薦。全程無階梯且路面平整；仍有少數陡坡須注意。' },
            { id: 'P', name: '路線 P (浩然步道)',  desc: '不推薦輪椅通行。路徑包含無法迴避的階梯區域。' },
            { id: 'B', name: '路線 B (東側斜坡線)', desc: '推行極度吃力。沿線路面不平整，且含有多段坡度 15% 以上之陡坡。' },
            { id: 'O', name: '路線 O (西側外環線)', desc: '高度危險路段。局部縱坡坡度高達 34.4%，極易發生輪椅傾倒或下滑失控風險。' }
        ];

        function renderRouteOptions() {
            const container = document.getElementById('route-options-container');
            container.innerHTML = '';
            const sorted = [...routeEvaluations].sort((a, b) => b.score - a.score);
            sorted.forEach(route => {
                const isActive = route.id === selectedRouteId ? 'active' : '';
                const html = `
                    <div class="route-option ${isActive}" onclick="selectRoute('${route.id}')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span><strong>${route.name}</strong></span>
                        </div>
                        <div class="route-meta">${route.desc}</div>
                    </div>
                `;
                container.innerHTML += html;
            });
            const currentSelected = routeEvaluations.find(r => r.id === selectedRouteId);
            document.getElementById('nav-panel-title').innerText = `導航中: ${currentSelected.name.split(' (')[0]}`;
        }

        // ==========================================
        // 全域功能函式 (AR 引導圓盤顏色邏輯更新)
        // ==========================================
        function selectRoute(routeId) {
            selectedRouteId = routeId;
            renderRouteOptions();
            updateMapLayers();
            injectArPoints(); 

            const panel = document.getElementById('nav-interface');
            if (!panel.classList.contains('collapsed')) {
                panel.classList.add('collapsed');
                const icon = panel.querySelector('.toggle-panel-btn i');
                icon.className = "fa-solid fa-chevron-down";
            }
        }

        function togglePanel(event) {
            if (event) event.stopPropagation();
            const panel = document.getElementById('nav-interface');
            const icon = panel.querySelector('.toggle-panel-btn i');
            
            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                icon.className = "fa-solid fa-chevron-up";
            } else {
                panel.classList.add('collapsed');
                icon.className = "fa-solid fa-chevron-down";
            }
        }

        function updateMapLayers() {
            if (!map.getLayer('highlight-line-layer')) return;
            map.setPaintProperty('highlight-line-layer', 'line-width', ['case', ['==', ['get', 'route'], selectedRouteId], 6, 1.5]);
            map.setPaintProperty('highlight-line-layer', 'line-opacity', ['case', ['==', ['get', 'route'], selectedRouteId], 1.0, 0.2]);
            map.setPaintProperty('nodes-layer', 'circle-radius', ['case', ['==', ['get', 'routeId'], selectedRouteId], 8, 4]);
            map.setPaintProperty('nodes-layer', 'circle-opacity', ['case', ['==', ['get', 'routeId'], selectedRouteId], 1.0, 0.25]);
            map.setPaintProperty('nodes-layer', 'circle-stroke-opacity', ['case', ['==', ['get', 'routeId'], selectedRouteId], 1.0, 0.25]);
            map.setPaintProperty('nodes-layer', 'circle-stroke-width', ['case', ['==', ['get', 'routeId'], selectedRouteId], 3, 1]);
        }

        function toggleViewMode() {
            const body = document.body;
            const btn = document.getElementById('toggle-view-btn');
            body.classList.toggle('ar-mode');
            
            if (body.classList.contains('ar-mode')) {
                btn.innerHTML = '<i class="fa-solid fa-map"></i>';
                btn.title = "返回地圖";
            } else {
                btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
                btn.title = "開啟 AR 鏡頭";
            }
        }

        // 🎯 這裡已修改為：圓柱體（引導圓盤）並動態綁定現地屬性顏色
        function injectArPoints() {
            const container = document.getElementById('ar-points-container');
            if(!container) return;
            container.innerHTML = '';
            const currentRoute = allRoutes[selectedRouteId];
            if(currentRoute) {
                currentRoute.forEach(pt => {
                    const el = document.createElement('a-entity');
                    el.setAttribute('gps-entity-place', `latitude: ${pt.lat}; longitude: ${pt.lng}`);
                    
                    // 設定為扁平圓柱體（看起來像引導圓盤）
                    el.setAttribute('geometry', 'primitive: cylinder; radius: 1.5; height: 0.2');
                    
                    // 根據坡度與階梯屬性動態配置 AR 圓盤顏色
                    let arColor = '#4dff4d'; // 預設：平路
                    if (pt.type === '連續階梯(危險)') {
                        arColor = '#ff4d4d'; // 紅色
                    } else if (pt.slope > 8.33) {
                        arColor = '#ff9900'; // 橘色
                    } else if (pt.slope > 0) {
                        arColor = '#ffff4d'; // 黃色
                    }
                    
                    // 使用 flat 著色器確保戶外 AR 顏色最精準
                    el.setAttribute('material', `color: ${arColor}; opacity: 0.85; shader: flat`); 
                    container.appendChild(el);
                });
            }
        }

        function clearAllCloudMarkers() {
            for (let key in window.activeCloudMarkers) {
                window.activeCloudMarkers[key].remove();
            }
            window.activeCloudMarkers = {};
        }

        // ==========================================
        // 4. MAPBOX 圖層高亮與動態切換
        // ==========================================
        map.on('load', () => {
            renderRouteOptions();

            document.getElementById('nav-interface').classList.add('collapsed');
            document.querySelector('.toggle-panel-btn i').className = "fa-solid fa-chevron-down";

            const featuresLine = [
                { 'type': 'Feature', 'properties': { 'route': 'P' }, 'geometry': { 'type': 'LineString', 'coordinates': routeP.map(i => [i.lng, i.lat]) } },
                { 'type': 'Feature', 'properties': { 'route': 'O' }, 'geometry': { 'type': 'LineString', 'coordinates': routeO.map(i => [i.lng, i.lat]) } },
                { 'type': 'Feature', 'properties': { 'route': 'B' }, 'geometry': { 'type': 'LineString', 'coordinates': routeB.map(i => [i.lng, i.lat]) } },
                { 'type': 'Feature', 'properties': { 'route': 'G' }, 'geometry': { 'type': 'LineString', 'coordinates': routeG.map(i => [i.lng, i.lat]) } }
            ];
            map.addSource('base-line-source', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': featuresLine } });
            map.addLayer({ 'id': 'base-line-layer', 'type': 'line', 'source': 'base-line-source', 'paint': { 'line-color': '#ccc', 'line-width': 2, 'line-dasharray': [2, 2] } });
            map.addLayer({
                'id': 'highlight-line-layer', 'type': 'line', 'source': 'base-line-source',
                'paint': {
                    'line-color': ['case', 
                        ['==', ['get', 'route'], 'P'], '#e533ff', 
                        ['==', ['get', 'route'], 'O'], '#ffaa00', 
                        ['==', ['get', 'route'], 'B'], '#3388ff', 
                        '#28a745'
                    ],
                    'line-width': 6,
                    'line-opacity': 1.0
                }
            });
            const featuresPoints = rawData.map(item => ({
                'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [item.lng, item.lat] },
                'properties': { 'id': item.id, 'type': item.type, 'slope': item.slope, 'routeId': item.routeId }
            }));
            map.addSource('nodes-source', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': featuresPoints } });
            map.addLayer({
                'id': 'nodes-layer', 'type': 'circle', 'source': 'nodes-source',
                'paint': {
                    'circle-radius': 8,
                    'circle-color': ['case', ['==', ['get', 'type'], '連續階梯(危險)'], '#ff4d4d', ['>', ['get', 'slope'], 8.33], '#ff9900', ['>', ['get', 'slope'], 0], '#ffff4d', '#4dff4d'],
                    'circle-stroke-width': 3,
                    'circle-stroke-color': ['case', 
                        ['==', ['get', 'routeId'], 'P'], '#e533ff', 
                        ['==', ['get', 'routeId'], 'O'], '#ffaa00', 
                        ['==', ['get', 'routeId'], 'B'], '#3388ff', 
                        '#28a745'
                    ],
                    'circle-opacity': 1.0,
                    'circle-stroke-opacity': 1.0
                }
            });
            
            map.addSource('ramp-source', {
                'type': 'geojson',
                'data': { 'type': 'FeatureCollection', 'features': rampData.map(item => ({
                    'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [item.lng, item.lat] },
                    'properties': { 'id': item.id, 'type': '無障礙坡道' }
                })) }
            });
            map.addLayer({
                'id': 'ramp-layer', 
                'type': 'circle', 
                'source': 'ramp-source',
                'paint': {
                    'circle-radius': 4,
                    'circle-color': '#4ea8de', 
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#ffffff' 
                }
            });
            updateMapLayers();
            injectArPoints();

            map.on('click', 'nodes-layer', (e) => {
                const coordinates = e.features[0].geometry.coordinates.slice();
                const props = e.features[0].properties;
                if(props.routeId !== selectedRouteId) return; 
                const rColor = props.routeId === 'P' ? '#e533ff' : props.routeId === 'O' ? '#ffaa00' : props.routeId === 'B' ? '#3388ff' : '#28a745';
                const popupContent = `<div style="padding: 3px; color:#333; font-size:12px;"><h4 style="margin: 0 0 4px 0; font-size: 13px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:${rColor};"></span> ${props.id}</h4><b>現地狀況：</b>${props.type}<br><b>實測坡度：</b>${props.slope}%</div>`;
                new mapboxgl.Popup().setLngLat(coordinates).setHTML(popupContent).addTo(map);
            });

            map.on('click', 'ramp-layer', (e) => {
                const props = e.features[0].properties;
                new mapboxgl.Popup().setLngLat(e.features[0].geometry.coordinates.slice()).setHTML(`
                    <div style="font-family: sans-serif; padding: 4px 2px; color:#333;">
                        <p style="margin: 0; font-size:13px; font-weight:bold;">📍 設施：${props.type}</p>
                    </div>
                `).addTo(map);
            });

            const interactiveLayers = ['nodes-layer', 'ramp-layer'];
            interactiveLayers.forEach(layer => {
                map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
                map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
            });
            
            // ==========================================
            // 5. 雲端通報相關功能
            // ==========================================
            map.on('contextmenu', (e) => {
                currentReportLngLat = e.lngLat;
                document.getElementById('coord-display').innerText = `${e.lngLat.lng.toFixed(5)}, ${e.lngLat.lat.toFixed(5)}`;
                document.getElementById('report-box').style.display = 'block';
            });

            document.getElementById('submit-report').onclick = () => {
                if(!currentReportLngLat) return;
                const type = document.getElementById('obstacle-type').value;
                database.ref('cloudReports').push({
                    lat: currentReportLngLat.lat,
                    lng: currentReportLngLat.lng,
                    type: type,
                    timestamp: Date.now()
                });
                document.getElementById('report-box').style.display = 'none';
                alert('通報已送出至雲端！');
            };

            document.getElementById('cancel-report').onclick = () => {
                document.getElementById('report-box').style.display = 'none';
            };

            database.ref('cloudReports').on('value', (snapshot) => {
                clearAllCloudMarkers(); 
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach((key) => {
                        const report = data[key];
                        const el = document.createElement('div');
                        el.className = 'cloud-marker';
                        
                        const popup = new mapboxgl.Popup({ offset: 15 }).setHTML(`
                            <div style="font-size:12px; color:#333;">
                                <strong style="color:#ff4d4d;">⚠️ 障礙通報</strong><br>
                                類型：${report.type}
                            </div>
                        `);
                        
                        const marker = new mapboxgl.Marker(el)
                            .setLngLat([report.lng, report.lat])
                            .setPopup(popup)
                            .addTo(map);
                            
                        window.activeCloudMarkers[key] = marker;
                    });
                }
            });

        });
    </script>
</body>
</html>
