            { id: "節點G8", lng: 120.99799, lat: 24.78560, type: "平緩坡道", slope: 6.99, routeId: "G", name: "綠色快捷無障礙線" },
            { id: "節點G9", lng: 120.99794, lat: 24.78462, type: "標準無障礙坡", slope: 8.75, routeId: "G", name: "綠色快捷無障礙線" },
            { id: "節點G11", lng: 120.99711, lat: 24.78413, type: "轉彎平緩坡", slope: 5.24, routeId: "G", name: "綠色快捷無障礙線" },
            { id: "終點(研三舍)", lng: 120.99704, lat: 24.78390, type: "終點/安全抵達", slope: 12.28, routeId: "G", name: "綠色快捷無障礙線" }
        ];

        const allRoutes = { 'P': routeP, 'O': routeO, 'B': routeB, 'G': routeG };
        const rawData = [...routeP, ...routeO, ...routeB, ...routeG];

        // ==========================================
        // 3. 舒適度評分演算與動態 UI 渲染
        // ==========================================
        const routeEvaluations = [
            { id: 'G', name: '路線 G (綠色快捷無障礙線)', score: 95, desc: '最推薦。全程無階梯，皆符合法規標準緩坡，路面平整。', badge: '最佳選擇', badgeType: 'success' },
            { id: 'P', name: '路線 P (浩然步道)', score: 60, desc: '不推薦輪椅。後半段經浩然圖書館側邊包含「連續階梯危險區域」。', badge: '有階梯危險', badgeType: 'danger' },
            { id: 'B', name: '路線 B (東側斜坡線)', score: 45, desc: '極度吃力。沿線多處路面凹陷破損，且含有多段 15% 以上陡坡。', badge: '路面不平/陡坡', badgeType: 'warning' },
            { id: 'O', name: '路線 O (西側外環線)', score: 30, desc: '危險。高達 34.4% 的極危險陡坡，極易發生推行傾倒風險。', badge: '極度陡坡危險', badgeType: 'danger' }
        ];

        function renderRouteOptions() {
            const container = document.getElementById('route-options-container');
            container.innerHTML = '';
            
            // 依舒適度 score 由高到低排序
            const sorted = [...routeEvaluations].sort((a, b) => b.score - a.score);
            
            sorted.forEach(route => {
                const isActive = route.id === selectedRouteId ? 'active' : '';
                const html = `
                    <div class="route-option ${isActive}" onclick="selectRoute('${route.id}')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span><strong>${route.name}</strong></span>
                            <span class="badge ${route.badgeType === 'success' ? 'success' : route.badgeType === 'danger' ? 'danger' : 'warning'}">${route.badge} (${route.score}分)</span>
                        </div>
                        <div class="route-meta">${route.desc}</div>
                    </div>
                `;
                container.innerHTML += html;
            });

            // 更新折疊狀態下的標題顯示文字，讓使用者知道目前選哪條
            const currentSelected = routeEvaluations.find(r => r.id === selectedRouteId);
            document.getElementById('nav-panel-title').innerText = `導航中: ${currentSelected.name.split(' (')[0]}`;
        }

        // 選擇路線事件
        function selectRoute(routeId) {
            selectedRouteId = routeId;
            renderRouteOptions();
            updateMapLayers();
            injectArPoints(); // 同步重繪 AR 畫面

            // 【新增功能】：選擇完路徑後，自動縮小/折疊路徑選擇面板
            const panel = document.getElementById('nav-interface');
            if (!panel.classList.contains('collapsed')) {
                panel.classList.add('collapsed');
                const icon = panel.querySelector('.toggle-panel-btn i');
                icon.className = "fa-solid fa-chevron-down";
            }
        }

        // 【新增功能】：控制面板展開與折疊的點擊函式
        function togglePanel(event) {
            if (event) event.stopPropagation(); // 防止事件冒泡
            const panel = document.getElementById('nav-interface');
            const icon = panel.querySelector('.toggle-panel-btn i');
            
            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                icon.className = "fa-solid fa-chevron-up";
            } else {
                panel.classList.add('collapsed');
                icon.className = "fa-solid fa-chevron-down";
            }
        }

        // ==========================================
        // 4. MAPBOX 圖層高亮與動態切換
        // ==========================================
        map.on('load', () => {
            renderRouteOptions();

            // 預設一開始不要全部展開擋住視野，自動縮小
            document.getElementById('nav-interface').classList.add('collapsed');
            document.querySelector('.toggle-panel-btn i').className = "fa-solid fa-chevron-down";

            // 載入 GeoJSON 數據
            const featuresLine = [
                { 'type': 'Feature', 'properties': { 'route': 'P' }, 'geometry': { 'type': 'LineString', 'coordinates': routeP.map(i => [i.lng, i.lat]) } },
                { 'type': 'Feature', 'properties': { 'route': 'O' }, 'geometry': { 'type': 'LineString', 'coordinates': routeO.map(i => [i.lng, i.lat]) } },
                { 'type': 'Feature', 'properties': { 'route': 'B' }, 'geometry': { 'type': 'LineString', 'coordinates': routeB.map(i => [i.lng, i.lat]) } },
                { 'type': 'Feature', 'properties': { 'route': 'G' }, 'geometry': { 'type': 'LineString', 'coordinates': routeG.map(i => [i.lng, i.lat]) } }
            ];
            map.addSource('base-line-source', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': featuresLine } });
            
            // 基礎背景灰色虛線
            map.addLayer({ 'id': 'base-line-layer', 'type': 'line', 'source': 'base-line-source', 'paint': { 'line-color': '#ccc', 'line-width': 2, 'line-dasharray': [2, 2] } });

            // 核心動態高亮導航線層
            map.addLayer({
                'id': 'highlight-line-layer', 'type': 'line', 'source': 'base-line-source',
                'paint': {
                    'line-color': ['case', ['==', ['get', 'route'], 'P'], '#3388ff', ['==', ['get', 'route'], 'O'], '#e533ff', ['==', ['get', 'route'], 'B'], '#ffaa00', '#28a745'],
                    'line-width': ['case', ['==', ['get', 'route'], selectedRouteId], 6, 1.5],
                    'line-opacity': ['case', ['==', ['get', 'route'], selectedRouteId], 1.0, 0.2]
                }
            });

            const featuresPoints = rawData.map(item => ({
                'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [item.lng, item.lat] },
                'properties': { 'id': item.id, 'type': item.type, 'slope': item.slope, 'routeId': item.routeId }
            }));
            map.addSource('nodes-source', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': featuresPoints } });
            map.addLayer({
                'id': 'nodes-layer', 'type': 'circle', 'source': 'nodes-source',
                'paint': {
                    'circle-radius': ['case', ['==', ['get', 'routeId'], selectedRouteId], 8, 4],
                    'circle-color': ['case', ['==', ['get', 'type'], '連續階梯(危險)'], '#ff4d4d', ['>', ['get', 'slope'], 8.33], '#ff9900', ['>', ['get', 'slope'], 0], '#ffff4d', '#4dff4d'],
                    'circle-stroke-width': ['case', ['==', ['get', 'routeId'], selectedRouteId], 3, 1],
                    'circle-stroke-color': ['case', ['==', ['get', 'routeId'], 'P'], '#3388ff', ['==', ['get', 'routeId'], 'O'], '#e533ff', ['==', ['get', 'routeId'], 'B'], '#ffaa00', '#28a745'],
                    'circle-opacity': ['case', ['==', ['get', 'routeId'], selectedRouteId], 1.0, 0.25],
                    'circle-stroke-opacity': ['case', ['==', ['get', 'routeId'], selectedRouteId], 1.0, 0.25]
                }
            });

            updateMapLayers();

            // 點擊圓點彈窗
            map.on('click', 'nodes-layer', (e) => {
                const coordinates = e.features[0].geometry.coordinates.slice();
                const props = e.features[0].properties;
                if(props.routeId !== selectedRouteId) return; // 只允許點擊當前選擇的導航路徑節點
                const rColor = props.routeId === 'P' ? '#3388ff' : props.routeId === 'O' ? '#e533ff' : props.routeId === 'B' ? '#ffaa00' : '#28a745';
                const popupContent = `<div style="padding: 3px; color:#333; font-size:12px;"><h4 style="margin: 0 0 4px 0; font-size: 13px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:${rColor};"></span> ${props.id}</h4><b>現地狀況：</b>${props.type}<br><b>實測坡度：</b>${props.slope}%</div>`;
                new mapboxgl.Popup().setLngLat(coordinates).setHTML(popupContent).addTo(map);
            });
            map.on('mouseenter', 'nodes-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'nodes-layer', () => { map.getCanvas().style.cursor = ''; });

            // FIREBASE 雲端監聽器
            database.ref('cloudReports').on('value', (snapshot) => {
                clearAllCloudMarkers(); 
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach((key) => {
                        const report = data[key];
                        createCloudReportMarker(report.lng, report.lat, report.type, key);
                    });
                }
            });

            // 2D 群眾回報機制
            let tempMarker = null; let currentLngLat = null;
            map.on('click', (e) => {
                const featuresAtPoint = map.queryRenderedFeatures(e.point, { layers: ['nodes-layer'] });
                if (featuresAtPoint.length > 0) return; 

                currentLngLat = e.lngLat;
                document.getElementById('coord-display').innerText = `${currentLngLat.lng.toFixed(5)}, ${currentLngLat.lat.toFixed(5)}`;
                document.getElementById('report-box').style.display = 'block';

                if (tempMarker) tempMarker.remove();
                tempMarker = new mapboxgl.Marker({ color: '#ffcc00' }).setLngLat(currentLngLat).addTo(map);
            });

            document.getElementById('submit-report').addEventListener('click', () => {
                const type = document.getElementById('obstacle-type').value;
                if (!currentLngLat) return;
                if (tempMarker) tempMarker.remove();
                database.ref('cloudReports').push({ lng: currentLngLat.lng, lat: currentLngLat.lat, type: type, timestamp: Date.now() });
                document.getElementById('report-box').style.display = 'none';
            });
            document.getElementById('cancel-report').addEventListener('click', () => {
                if (tempMarker) tempMarker.remove();
                document.getElementById('report-box').style.display = 'none';
            });
        });

        function updateMapLayers() {
            if (!map.getLayer('highlight-line-layer')) return;
            map.setPaintProperty('highlight-line-layer', 'line-width', ['case', ['==', ['get', 'route'], selectedRouteId], 6, 1.5]);
            map.setPaintProperty('highlight-line-layer', 'line-opacity', ['case', ['==', ['get', 'route'], selectedRouteId], 1.0, 0.15]);
            map.setPaintProperty('nodes-layer', 'circle-radius', ['case', ['==', ['get', 'routeId'], selectedRouteId], 8, 3]);
            map.setPaintProperty('nodes-layer', 'circle-opacity', ['case', ['==', ['get', 'routeId'], selectedRouteId], 1.0, 0.1]);
            map.setPaintProperty('nodes-layer', 'circle-stroke-opacity', ['case', ['==', ['get', 'routeId'], selectedRouteId], 1.0, 0.1]);
        }

        // ==========================================
        // 5. AR 實景優化：動態過濾與地面三維路徑線 (已完全拿掉文字描述)
        // ==========================================
        const sceneEl = document.querySelector('a-scene');
        
        const injectArPoints = () => {
            const arContainer = document.getElementById('ar-points-container');
            arContainer.innerHTML = ''; // 徹底清除上一次的舊實體

            // 只抓取當前在 UI 上選中的那一條路線數據
            const targetRouteData = allRoutes[selectedRouteId];
            if (!targetRouteData) return;

            // 【已移除文字標籤生成邏輯，使畫面上完全不顯示中文字】

            // 動態在 AR 螢幕實景中佈署地面導航引導圓盤
            for (let i = 0; i < targetRouteData.length - 1; i++) {
                const ptA = targetRouteData[i];
                const ptB = targetRouteData[i+1];
                
                const lineIndicator = document.createElement('a-entity');
                lineIndicator.setAttribute('gps-entity-place', `latitude: ${ptA.lat}; longitude: ${ptA.lng};`);
                lineIndicator.setAttribute('geometry', 'primitive: cylinder; radius: 1.5; height: 0.1;');
                
                let routeColor = selectedRouteId === 'G' ? '#28a745' : selectedRouteId === 'P' ? '#3388ff' : selectedRouteId === 'B' ? '#ffaa00' : '#e533ff';
                lineIndicator.setAttribute('material', `color: ${routeColor}; opacity: 0.7; shader: flat;`);
                lineIndicator.setAttribute('position', '0 0.1 0'); // 貼齊地面
                
                arContainer.appendChild(lineIndicator);
                
                // 在 A 與 B 之間補一個中間導航點
                const midLng = (ptA.lng + ptB.lng) / 2;
                const midLat = (ptA.lat + ptB.lat) / 2;
                const midIndicator = document.createElement('a-entity');
                midIndicator.setAttribute('gps-entity-place', `latitude: ${midLat}; longitude: ${midLng};`);
                midIndicator.setAttribute('geometry', 'primitive: cylinder; radius: 1.0; height: 0.08;');
                midIndicator.setAttribute('material', `color: ${routeColor}; opacity: 0.5; shader: flat;`);
                midIndicator.setAttribute('position', '0 0.1 0');
                arContainer.appendChild(midIndicator);
            }
        };

        if (sceneEl.hasLoaded) { injectArPoints(); } else { sceneEl.addEventListener('loaded', injectArPoints); }

        // ==========================================
        // 6. 介面控制與動態視窗跑版修復
        // ==========================================
        function createCloudReportMarker(lng, lat, type, firebaseKey) {
            const marker = new mapboxgl.Marker({ color: '#d93838' }).setLngLat([lng, lat]);
            const popupContent = `
                <div style="padding: 3px; font-size:12px; min-width: 150px;">
                    <h4 style="margin:0 0 4px 0; color:#d93838;">🌐 雲端路況通報</h4>
                    <b>狀況：</b>${type}<br>
                    <span style="font-size:10px; color:#999;">經緯度: ${lng.toFixed(4)}, ${lat.toFixed(4)}</span>
                    <hr style="margin: 6px 0; border: none; border-top: 1px solid #eee;">
                    <button onclick="deleteCloudReport('${firebaseKey}')" style="width: 100%; background: #666; color: white; border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold;">❌ 撤銷此通報</button>
                </div>
            `;
            marker.setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(popupContent));
            marker.addTo(map);
            window.activeCloudMarkers[firebaseKey] = marker;
        }

        function deleteCloudReport(firebaseKey) { database.ref(`cloudReports/${firebaseKey}`).remove(); }
        function clearAllCloudMarkers() {
            if (window.activeCloudMarkers) {
                Object.keys(window.activeCloudMarkers).forEach((key) => { if(window.activeCloudMarkers[key]) window.activeCloudMarkers[key].remove(); });
            }
            window.activeCloudMarkers = {};
        }

        function toggleViewMode() {
            const body = document.body;
            const btn = document.getElementById('toggle-view-btn');
            if (body.classList.contains('map-mode')) {
                body.className = 'ar-mode';
                btn.innerHTML = '<i class="fa-solid fa-map"></i>';
                btn.title = "切換回 2D 地圖";
            } else {
                body.className = 'map-mode';
                btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
                btn.title = "開啟 AR 鏡頭";
            }
        }
    </script>
</body>
</html>
