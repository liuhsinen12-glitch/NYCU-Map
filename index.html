            { id: "起點(工程二館)", lng: 120.99769, lat: 24.78869, type: "起點", slope: 0, routeId: "G" },
            { id: "節點G1", lng: 120.99767, lat: 24.78848, type: "轉彎微緩坡", slope: 3.49, routeId: "G" },
            { id: "節點G2", lng: 120.99813, lat: 24.78850, type: "微幅平緩坡", slope: 1.75, routeId: "G" },
            { id: "節點G4", lng: 120.99821, lat: 24.78753, type: "標準無障礙坡", slope: 8.75, routeId: "G" },
            { id: "節點G5", lng: 120.99818, lat: 24.78669, type: "平緩坡", slope: 5.24, routeId: "G" },
            { id: "節點G6", lng: 120.99825, lat: 24.78661, type: "標準無障礙坡", slope: 8.75, routeId: "G" },
            { id: "節點G7", lng: 120.99797, lat: 24.78625, type: "標準無障礙坡", slope: 8.75, routeId: "G" },
            { id: "節點G8", lng: 120.99799, lat: 24.78560, type: "平緩坡道", slope: 6.99, routeId: "G" },
            { id: "節點G9", lng: 120.99794, lat: 24.78462, type: "標準無障礙坡", slope: 8.75, routeId: "G" },
            { id: "節點G11", lng: 120.99711, lat: 24.78413, type: "轉彎平緩坡", slope: 5.24, routeId: "G" },
            { id: "終點(研三舍)", lng: 120.99704, lat: 24.78390, type: "終點/安全抵達", slope: 12.28, routeId: "G" }
        ];

        const rampData = [
            { id: "坡道 1", lat: 24.78662, lng: 120.99619 },
            { id: "坡道 2", lat: 24.78962, lng: 120.99516 },
            { id: "坡道 3", lat: 24.78683, lng: 120.99568 },
            { id: "坡道 4", lat: 24.78616, lng: 120.99978 },
            { id: "坡道 5", lat: 24.78390, lng: 120.99722 },
            { id: "坡道 6", lat: 24.78812, lng: 120.99773 },
            { id: "坡道 7", lat: 24.78744, lng: 121.00060 },
            { id: "坡道 8", lat: 24.78780, lng: 120.99717 },
            { id: "坡道 9", lat: 24.78806, lng: 120.99843 },
            { id: "坡道 10", lat: 24.78843, lng: 120.99836 },
            { id: "坡道 11", lat: 24.78959, lng: 120.99610 },
            { id: "坡道 12", lat: 24.79021, lng: 120.99651 },
            { id: "坡道 13", lat: 24.79025, lng: 120.99594 },
            { id: "坡道 14", lat: 24.78795, lng: 120.99554 },
            { id: "坡道 15", lat: 24.78785, lng: 120.99478 }
        ];

        const allRoutesData = [...routeP, ...routeO, ...routeB, ...routeG];

        // ==========================================
        // 3. 地圖與圖層初始化
        // ==========================================
        map.on('load', () => {
            // 填入無障礙坡道點位
            rampData.forEach((ramp) => {
                new mapboxgl.Marker({ color: '#4ea8de' })
                    .setLngLat([ramp.lng, ramp.lat])
                    .setPopup(new mapboxgl.Popup({ offset: 10 }).setHTML(`<strong>🛹 ${ramp.id}</strong>`))
                    .addTo(map);
            });

            // 繪製推薦路線線段
            const routesGeoJSON = {
                'type': 'FeatureCollection',
                'features': [
                    { 'type': 'Feature', 'properties': { 'route': 'P' }, 'geometry': { 'type': 'LineString', 'coordinates': routeP.map(i => [i.lng, i.lat]) } },
                    { 'type': 'Feature', 'properties': { 'route': 'O' }, 'geometry': { 'type': 'LineString', 'coordinates': routeO.map(i => [i.lng, i.lat]) } },
                    { 'type': 'Feature', 'properties': { 'route': 'B' }, 'geometry': { 'type': 'LineString', 'coordinates': routeB.map(i => [i.lng, i.lat]) } },
                    { 'type': 'Feature', 'properties': { 'route': 'G' }, 'geometry': { 'type': 'LineString', 'coordinates': routeG.map(i => [i.lng, i.lat]) } }
                ]
            };

            map.addSource('highlight-lines', { 'type': 'geojson', 'data': routesGeoJSON });
            map.addLayer({
                'id': 'highlight-line-layer', 'type': 'line', 'source': 'highlight-lines',
                'layout': { 'line-join': 'round', 'line-cap': 'round' },
                'paint': {
                    'line-color': ['case', ['==', ['get', 'route'], 'P'], '#e533ff', ['==', ['get', 'route'], 'O'], '#ffaa00', ['==', ['get', 'route'], 'B'], '#3388ff', '#28a745'],
                    'line-width': 2, 'line-opacity': 0.4
                }
            });

            // 繪製路網節點
            const featuresPoints = allRoutesData.map(item => ({
                'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [item.lng, item.lat] },
                'properties': { 'id': item.id, 'type': item.type, 'slope': item.slope, 'routeId': item.routeId }
            }));

            map.addSource('nodes-source', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': featuresPoints } });
            map.addLayer({
                'id': 'nodes-layer', 'type': 'circle', 'source': 'nodes-source',
                'paint': {
                    'circle-radius': 5,
                    'circle-color': ['case', ['==', ['get', 'type'], '連續階梯(危險)'], '#ff4d4d', ['>', ['get', 'slope'], 8.33], '#ff9900', ['>', ['get', 'slope'], 0], '#ffff4d', '#4dff4d'],
                    'circle-stroke-width': 2,
                    'circle-stroke-color': ['case', ['==', ['get', 'routeId'], 'P'], '#e533ff', ['==', ['get', 'routeId'], 'O'], '#ffaa00', ['==', ['get', 'routeId'], 'B'], '#3388ff', '#28a745']
                }
            });

            // 功能 1：點擊地圖抓取位置並產生「即時路況動態暫存標記」
            map.on('click', (e) => {
                if (document.body.classList.contains('ar-mode')) return;
                currentReportLngLat = e.lngLat;
                
                // 更新回報視窗座標並打開它
                document.getElementById('coord-display').innerText = `${currentReportLngLat.lng.toFixed(5)}, ${currentReportLngLat.lat.toFixed(5)}`;
                document.getElementById('report-box').style.display = 'block';

                // 移除上一個未提交的暫存標記（如果有）
                if (tempMarker) tempMarker.remove();

                // 在地圖選取點建立帶有呼吸波紋動畫的藍色圖示
                const el = document.createElement('div');
                el.className = 'temp-report-marker';
                tempMarker = new mapboxgl.Marker(el)
                    .setLngLat([currentReportLngLat.lng, currentReportLngLat.lat])
                    .addTo(map);
            });

            selectRoute('G');
            renderPanelOptions();

            // FIREBASE 雲端即時動態數據監聽器 (功能 2：區分待審核與核准狀態)
            database.ref('cloudReports').on('value', (snapshot) => {
                clearAllCloudMarkers(); 
                const data = snapshot.val();
                currentFirebaseDataCache = data; // 寫入緩存供管理員面板使用
                
                if (data) {
                    Object.keys(data).forEach((key) => {
                        const report = data[key];
                        const el = document.createElement('div');
                        
                        let statusText = "";
                        // 判斷狀態：若為 approved 顯示紅色警告，其餘（包含 pending）皆顯示虛點待審
                        if (report.status === 'approved') {
                            el.className = 'cloud-marker approved';
                            statusText = `<span style="color:#ff4d4d; font-weight:bold;">🔴 已核准上線</span>`;
                        } else {
                            el.className = 'cloud-marker pending';
                            statusText = `<span style="color:#fca311; font-weight:bold;">🟡 待審核虛點</span>`;
                        }
                        
                        // 地圖圖點彈出式視窗內建管理審查功能
                        let popupHTML = `
                            <div style="font-size:12px; color:#333; line-height:1.5; min-width:150px;">
                                <strong style="font-size:13px; color:#0056b3;">⚠️ 即時路況資訊</strong><br>
                                類型：${report.type}<br>
                                狀態：${statusText}
                                <hr style="margin:5px 0; border:none; border-top:1px solid #ddd;">
                                <div style="display:flex; gap:5px; margin-top:4px;">
                        `;

                        // 如果此點未通過審核，顯示「核准」按鈕（此處點擊會檢查管理登入狀態或密碼）
                        if (report.status !== 'approved') {
                            popupHTML += `<button onclick="directApprove('${key}')" style="background:#28a745; color:white; border:none; padding:3px 6px; border-radius:3px; cursor:pointer; font-size:10px;">核准</button>`;
                        }
                        // 任何點位管理員皆可隨時取消刪除
                        popupHTML += `<button onclick="directDelete('${key}')" style="background:#ff4d4d; color:white; border:none; padding:3px 6px; border-radius:3px; cursor:pointer; font-size:10px;">取消問題</button>`;
                        popupHTML += `</div></div>`;

                        const popup = new mapboxgl.Popup({ offset: 15 }).setHTML(popupHTML);
                        
                        const marker = new mapboxgl.Marker(el)
                            .setLngLat([report.lng, report.lat])
                            .setPopup(popup)
                            .addTo(map);
                            
                        window.activeCloudMarkers[key] = marker;
                    });
                }
                // 同步更新管理員右側控制面板
                if (isAdminLoggedIn) { refreshAdminList(data); }
            });
        });

        function clearAllCloudMarkers() {
            Object.keys(window.activeCloudMarkers).forEach((key) => {
                window.activeCloudMarkers[key].remove();
            });
            window.activeCloudMarkers = {};
        }

        // ==========================================
        // 4. 介面控制與導航面板邏輯
        // ==========================================
        function togglePanel(e) {
            e.stopPropagation();
            const panel = document.getElementById('nav-interface');
            const icon = panel.querySelector('.toggle-panel-btn i');
            const title = document.getElementById('nav-panel-title');
            
            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                icon.className = "fa-solid fa-chevron-up";
                title.innerText = "校園無障礙導航";
            } else {
                panel.classList.add('collapsed');
                icon.className = "fa-solid fa-chevron-down";
                title.innerText = "校園無障礙導航 (已縮小)";
            }
        }

        function updateMapLayers() {
            if (!map.getLayer('highlight-line-layer')) return;
            map.setPaintProperty('highlight-line-layer', 'line-width', ['case', ['==', ['get', 'route'], selectedRouteId], 6, 1.5]);
            map.setPaintProperty('highlight-line-layer', 'line-opacity', ['case', ['==', ['get', 'route'], selectedRouteId], 1.0, 0.2]);
            map.setPaintProperty('nodes-layer', 'circle-radius', ['case', ['==', ['get', 'routeId'], selectedRouteId], 8, 4]);
        }

        function selectRoute(routeId) {
            selectedRouteId = routeId;
            updateMapLayers();
            renderARPoints();
            
            const options = document.querySelectorAll('.route-option');
            options.forEach(opt => {
                opt.classList.toggle('active', opt.getAttribute('data-id') === routeId);
            });
        }

        function renderPanelOptions() {
            const container = document.getElementById('route-options-container');
            const optionsData = [
                { id: 'G', title: '路線 G (綠色快捷無障礙線)', meta: '舒適度評分：🌟 9.5 | 全程平緩無階梯，最推薦輪椅族', badge: '安全', badgeClass: 'success' },
                { id: 'B', title: '路線 B (東側斜坡線)', meta: '舒適度評分：⭐ 6.2 | 部分路面稍微不平整，有少許陡坡', badge: '多陡坡', badgeClass: 'warning' },
                { id: 'P', title: '路線 P (浩然步道)', meta: '舒適度評分：🌙 4.0 | 包含連續階梯風險，不建議輪椅通行', badge: '有階梯', badgeClass: 'danger' },
                { id: 'O', title: '路線 O (西側外環線)', meta: '舒適度評分：❌ 2.1 | 極危險陡坡高達 34%，強烈建議避開', badge: '極危險', badgeClass: 'danger' }
            ];

            container.innerHTML = optionsData.map(opt => `
                <div class="route-option ${opt.id === selectedRouteId ? 'active' : ''}" data-id="${opt.id}" onclick="selectRoute('${opt.id}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${opt.title}</span>
                        <span class="badge ${opt.badgeClass}">${opt.badge}</span>
                    </div>
                    <div class="route-meta">${opt.meta}</div>
                </div>
            `).join('');
        }

        // ==========================================
        // 5. AR 模式控制
        // ==========================================
        function toggleViewMode() {
            const body = document.body;
            const btn = document.getElementById('toggle-view-btn');
            body.classList.toggle('ar-mode');
            if (body.classList.contains('ar-mode')) {
                btn.innerHTML = '<i class="fa-solid fa-map"></i>'; btn.title = "返回地圖";
            } else {
                btn.innerHTML = '<i class="fa-solid fa-eye"></i>'; btn.title = "開啟 AR 鏡頭";
            }
        }

        function renderARPoints() {
            const container = document.getElementById('ar-points-container');
            container.innerHTML = '';
            const activeData = allRoutesData.filter(item => item.routeId === selectedRouteId);
            
            activeData.forEach((pt) => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('gps-entity-place', `latitude: ${pt.lat}; longitude: ${pt.lng};`);
                
                let color = '#4dff4d';
                if (pt.type.includes('階梯')) color = '#ff4d4d';
                else if (pt.slope > 8.33) color = '#ff9900';
                else if (pt.slope > 0) color = '#ffff4d';

                entity.innerHTML = `
                    <a-sphere radius="2" material="color: ${color}; opacity: 0.9; shader: flat;"></a-sphere>
                    <a-text value="${pt.id}\n(${pt.type})" scale="15 15 15" align="center" color="#ffffff" position="0 5 0" look-at="[gps-camera]"></a-text>
                `;
                container.appendChild(entity);
            });
        }

        // ==========================================
        // 6. 回報視窗互動事件（功能 2：預設塞入 pending 狀態）
        // ==========================================
        document.getElementById('cancel-report').onclick = () => {
            document.getElementById('report-box').style.display = 'none';
            if (tempMarker) { tempMarker.remove(); tempMarker = null; }
        };

        document.getElementById('submit-report').onclick = () => {
            if (!currentReportLngLat) return;
            const type = document.getElementById('obstacle-type').value;
            
            // 預設 status 填入 'pending' 轉為待審核虛點
            database.ref('cloudReports').push({
                type: type,
                lng: currentReportLngLat.lng,
                lat: currentReportLngLat.lat,
                status: 'pending', 
                timestamp: Date.now()
            }).then(() => {
                alert('🎉 通報成功！此路點已先進入後台審核，審核通過前會以黃色虛點顯示。');
                document.getElementById('report-box').style.display = 'none';
                if (tempMarker) { tempMarker.remove(); tempMarker = null; }
            }).catch((err) => {
                alert('上傳失敗：' + err.message);
            });
        };

        // ==========================================
        // 7. 管理員權限驗證與直通控制項
        // ==========================================
        function checkAdminAuth() {
            if (isAdminLoggedIn) return true;
            const password = prompt("請輸入管理員後台驗證密碼：");
            if (password === "1234") {
                isAdminLoggedIn = true;
                return true;
            } else {
                alert("❌ 密碼錯誤，拒絕執行管理員操作！");
                return false;
            }
        }

        // 地圖 Popup 直通核准與取消控制
        window.directApprove = function(key) {
            if (!checkAdminAuth()) return;
            if (confirm("確定要核准此項目，讓它在地圖上變為紅色警示點嗎？")) {
                database.ref(`cloudReports/${key}`).update({ status: 'approved' })
                    .then(() => alert("已成功核准並轉為紅色警告點！"));
            }
        };

        window.directDelete = function(key) {
            if (!checkAdminAuth()) return;
            if (confirm("確定要取消並完全移除此路況問題嗎？")) {
                database.ref(`cloudReports/${key}`).remove()
                    .then(() => alert("路況問題已成功取消移除！"));
            }
        };

        // ==========================================
        // 8. 右側按鈕管理員後台面板
        // ==========================================
        function openAdminPanel() {
            if (!checkAdminAuth()) return;
            document.getElementById('admin-panel').style.display = 'block';
            refreshAdminList(currentFirebaseDataCache);
        }

        function closeAdminPanel() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        function refreshAdminList(data) {
            const container = document.getElementById('admin-list-container');
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = '<div style="color:#888; text-align:center; padding:10px;">目前沒有任何障礙通報數據。</div>';
                return;
            }
            
            let htmlStr = '';
            Object.keys(data).forEach((key) => {
                const item = data[key];
                const isApproved = item.status === 'approved';
                const statusBadge = isApproved ? '<span style="color:green;">[已核准]</span>' : '<span style="color:orange;">[待審核]</span>';
                
                htmlStr += `
                    <div class="admin-report-item">
                        <div>
                            <strong>${item.type}</strong> ${statusBadge}<br>
                            <span style="font-size:10px; color:#777;">座標: [${item.lng.toFixed(4)}, ${item.lat.toFixed(4)}]</span>
                        </div>
                        <div class="admin-btn-group">
                            ${!isApproved ? `<button class="admin-action-btn approve" onclick="directApprove('${key}')">通過</button>` : ''}
                            <button class="admin-action-btn delete" onclick="directDelete('${key}')">取消路況</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = htmlStr;
        }
    </script>
</body>
</html>
